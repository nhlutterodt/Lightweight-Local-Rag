services:
  server:
    build: 
      context: .
      dockerfile: gui/server/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - SERVER_HOST=0.0.0.0
      - CORS_ORIGINS=http://localhost:5173;http://localhost:8080
      # Allow the backend to browse the /data mounted volume
      - ALLOWED_BROWSE_ROOTS=/data
    volumes:
      # Named volume for persistent Vector Store DB
      - db_data:/app/PowerShell Scripts/Data
      # Named volume for the /api/browse root
      - ingest_data:/data
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/api/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  client:
    build:
      context: ./gui/client/react-client
      dockerfile: Dockerfile
      args:
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10}
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama@sha256:e23e6499890325d31f3454cdc83f7a613a2423c8a9e167bbafea0b0e3c27d7c6}
    restart: unless-stopped
    # ports:
    #   - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
      - ollama_data:/root/.ollama_backup
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s
    # Remove the comments below to enable GPU acceleration if the host is configured for it
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]


  ollama-init:
    image: ${OLLAMA_IMAGE:-ollama/ollama@sha256:e23e6499890325d31f3454cdc83f7a613a2423c8a9e167bbafea0b0e3c27d7c6}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "/scripts/ollama-init.sh"]
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-ollama:11434}
      - OLLAMA_MODELS=${OLLAMA_MODELS:-nomic-embed-text llama3.1:8b}
      - OLLAMA_MAX_RETRIES=${OLLAMA_MAX_RETRIES:-60}
      - OLLAMA_RETRY_SECONDS=${OLLAMA_RETRY_SECONDS:-2}
      - OLLAMA_PULL_RETRIES=${OLLAMA_PULL_RETRIES:-5}
    volumes:
      - ./scripts/ollama-init.sh:/scripts/ollama-init.sh:ro

volumes:
  ollama_data:
  db_data:
  ingest_data:
