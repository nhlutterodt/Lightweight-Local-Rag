name: Frontend UI Tests

on:
  pull_request:
    paths:
      - 'gui/client/react-client/**'
      - '.github/workflows/frontend-ui-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'gui/client/react-client/**'
      - '.github/workflows/frontend-ui-tests.yml'
  workflow_dispatch:

jobs:
  test:
    name: React Client Vitest Suite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gui/client/react-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: gui/client/react-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test
