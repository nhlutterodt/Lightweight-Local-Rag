name: Validate Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/Validate-Docs.ps1'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/Validate-Docs.ps1'
  workflow_dispatch:

jobs:
  validate:
    name: Docs Governance Check
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run docs validator
        shell: pwsh
        run: pwsh ./scripts/Validate-Docs.ps1

      - name: Upload validator output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-validation-failure
          path: docs/
          retention-days: 7
