name: Validate Governance

on:
  pull_request:
    paths:
      - '.gitignore'
      - 'scripts/Validate-GitIgnore.ps1'
      - 'docs/**'
      - 'scripts/Validate-Docs.ps1'
  push:
    branches:
      - main
    paths:
      - '.gitignore'
      - 'scripts/Validate-GitIgnore.ps1'
      - 'docs/**'
      - 'scripts/Validate-Docs.ps1'
  workflow_dispatch:

jobs:
  validate:
    name: Repository Governance Check
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run gitignore validator
        shell: pwsh
        run: pwsh ./scripts/Validate-GitIgnore.ps1

      - name: Run docs validator
        shell: pwsh
        run: pwsh ./scripts/Validate-Docs.ps1

      - name: Upload validator output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: governance-validation-failure
          path: |
            .gitignore
            docs/
            scripts/Validate-GitIgnore.ps1
            scripts/Validate-Docs.ps1
          retention-days: 7
